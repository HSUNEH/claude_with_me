# ============================================================
# CWM 프로젝트 설정 파일
# ============================================================
# /cwm:setupwithme 가 프로젝트에 맞게 자동 생성합니다.
# 이 파일 수정으로 Hook 동작이 바뀝니다.
# ============================================================


# ─── 1. 키워드 매칭 ─────────────────────────────────────────
keywords:
  dev: "만들|개발|수정|추가|삭제|리팩토링|구현|생성|변경|시작|이어서|계속|진행|다음|깨졌|안 ?[되돼]|합[쳐치]|병합|넣[어고]|붙[여이]|옮[기겨]|분리|나[누눠]|fix|create|add|update|delete|refactor|implement|build|start|continue|resume|next|merge|split|move"
  test: "테스트|검증|확인|test|verify|check|spec|jest|pytest"
  deploy: "배포|deploy|release|publish|docker|ci|cd"
  docs: "문서|작성|readme|doc|설명|가이드|write.*doc"


# ─── 2. 의도 파악 ───────────────────────────────────────────
intents:
  new_feature:
    patterns: "(새로운|새 |신규).*(기능|페이지|컴포넌트|모듈|API)|추가[해하할]|만들[어고]|구현[해하]|넣[어고]|생성[해하]|붙[여이]|create|implement|add new"
    label: "새 기능 개발"
    require_plan: true

  bugfix:
    patterns: "버그|오류|에러|안 ?됨|안 ?돼|수정[해하]|고[쳐치]|fix|bug|error|broken|not working"
    label: "버그 수정"
    require_plan: true

  refactor:
    patterns: "리팩토링|정리[해하]?|개선[해하]?|최적화|성능|합[쳐치]|병합[해하]?|분리[해하]?|나[누눠]|옮[기겨]|refactor|clean ?up|optimize|improve"
    label: "리팩토링"
    require_plan: true

  api:
    patterns: "api|엔드포인트|endpoint|라우트|route|요청|request|응답|response|REST|GraphQL"
    label: "API 작업"
    require_plan: true

  security:
    patterns: "보안|인증|권한|토큰|암호|security|auth|token|permission|encrypt"
    label: "보안 작업"
    require_plan: true

  test:
    patterns: "테스트|test|spec|검증|커버리지|coverage"
    label: "테스트 작업"
    require_plan: false

  docs:
    patterns: "문서|doc|readme|가이드|설명서|주석|comment"
    label: "문서 작업"
    require_plan: false


# ─── 3. 작업 위치 ───────────────────────────────────────────
locations:
  ui:
    patterns: "(components?|pages?|views?|layouts?|app)/.*\\.(tsx?|jsx?|vue|svelte)"
    label: "UI/Frontend"
  api:
    patterns: "(api|routes?|controllers?|handlers?)/"
    label: "API/Routes"
  service:
    patterns: "(services?|lib|utils?|helpers?|hooks)/"
    label: "Service/Logic"
  db:
    patterns: "(models?|schema|migration|prisma|drizzle|database|db)/"
    label: "DB/Model"
  config:
    patterns: "(config|\\.env|tsconfig|package\\.json|next\\.config|vite\\.config)"
    label: "Config"
  test:
    patterns: "(tests?|__tests__|spec|\\.test\\.|\\.spec\\.)"
    label: "Test"


# ─── 4. 코드 패턴 감지 ──────────────────────────────────────
code_patterns:
  security_dangerous_functions:
    pattern: "(eval\\(|innerHTML|dangerouslySetInnerHTML|exec\\(|\\.raw\\()"
    severity: "critical"
    message: "[Security] Dangerous function detected"

  security_hardcoded_secrets:
    pattern: "(password|secret|api_key|apikey|token|credential)\\s*[:=]\\s*[\"'][^\"']"
    severity: "critical"
    message: "[Security] Hardcoded secret suspected"


# ─── 5. Plan Enforcer 설정 ───────────────────────────────────
plan_enforcer:
  threshold: 3


# ─── 6. 완료 검사 ───────────────────────────────────────────
completion_check:
  threshold_immediate_fix: 3
  threshold_agent_recommend: 4


# ─── 7. 에이전트 ────────────────────────────────────────────
agents:
  qa-agent:
    description: "코드 검토, 오류 수정, 구조 개선"
  test-agent:
    description: "기능 테스트, 오류 진단, 테스트 작성"
  planning-agent:
    description: "계획 수립, 계획 검토, 문서 작성"


# ─── 8. 일반 설정 ───────────────────────────────────────────
general:
  require_plan: true
  change_log_path: ".cwm/docs/logs/change-log.md"
  plans_path: ".cwm/docs/plans"
  reports_path: ".cwm/docs/reports"
